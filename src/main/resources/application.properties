# Server Configuration
server.port=8080

# Application Name
spring.application.name=file-download-service

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/filedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=update

# JWT Configuration
app.jwt.secret=YourSuperSecretKeyForJWTTokenGenerationMustBeLongEnough2024
app.jwt.expiration-ms=86400000

# File Configuration
app.workspace-dir=/root/.openclaw/workspace

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173

# Logging
logging.level.com.openclaw=DEBUG
logging.level.org.springframework.security=DEBUG
