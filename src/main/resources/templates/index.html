<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件下载服务</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px 32px;
        }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .path-bar {
            background: #f8f9fa;
            padding: 12px 32px;
            border-bottom: 1px solid #e9ecef;
            font-family: monospace;
            font-size: 13px;
            color: #495057;
            word-break: break-all;
        }
        .error {
            background: #fee;
            color: #c00;
            padding: 12px 32px;
            border-bottom: 1px solid #fcc;
        }
        .file-list {
            list-style: none;
        }
        .file-item {
            display: flex;
            align-items: center;
            padding: 14px 32px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }
        .file-item:hover {
            background: #f8f9fa;
        }
        .file-icon {
            font-size: 24px;
            margin-right: 16px;
            width: 32px;
            text-align: center;
        }
        .file-info {
            flex: 1;
            min-width: 0;
        }
        .file-name {
            font-weight: 500;
            color: #333;
            word-break: break-all;
        }
        .file-meta {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        .download-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .download-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .back-btn {
            background: #6c757d;
            margin-right: 10px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 32px;
            color: #888;
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📁 文件下载服务</h1>
            <p>OpenClaw Workspace 文件管理器</p>
        </div>
        
        <div class="path-bar" th:text="${currentPath}">/root/.openclaw/workspace</div>
        
        <div th:if="${error}" class="error" th:text="${error}"></div>
        
        <ul class="file-list">
            <!-- 返回上级目录 -->
            <li class="file-item" th:if="${currentPath != workspaceDir}">
                <span class="file-icon">📁</span>
                <div class="file-info">
                    <div class="file-name">..</div>
                    <div class="file-meta">返回上级目录</div>
                </div>
                <a th:href="@{/(path=${parentPath})}" class="download-btn back-btn">返回</a>
            </li>
            
            <!-- 文件列表 -->
            <li class="file-item" th:each="file : ${files}">
                <span class="file-icon" th:text="${file.directory} ? '📁' : '📄'">📄</span>
                <div class="file-info">
                    <div class="file-name" th:text="${file.name}">filename</div>
                    <div class="file-meta">
                        <span th:text="${file.directory} ? '文件夹' : ${file.formattedSize}">-</span>
                        <span th:if="${!file.directory}" th:text="' | ' + ${#dates.format(file.lastModified, 'yyyy-MM-dd HH:mm')}"></span>
                    </div>
                </div>
                <a th:if="${!file.directory}" 
                   th:href="@{/download(file=${file.path})}" 
                   class="download-btn">下载</a>
                <a th:if="${file.directory}" 
                   th:href="@{/(path=${file.path})}" 
                   class="download-btn" style="background: #28a745;">进入</a>
            </li>
            
            <!-- 空状态 -->
            <li th:if="${#lists.isEmpty(files)}" class="empty-state">
                <div class="icon">📭</div>
                <div>此目录为空</div>
            </li>
        </ul>
    </div>
</body>
</html>
